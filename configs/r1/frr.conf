frr version 8.4
frr defaults traditional
hostname r1
log stdout
service integrated-vtysh-config
!
agentx
!
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp ebgp-requires-policy
 neighbor 10.0.12.2 remote-as 65002
 timers bgp 3 9
 !
 address-family ipv4 unicast
  network 1.1.1.1/32
 exit-address-family
!
ip route 1.1.1.1/32 lo
!
line vty
