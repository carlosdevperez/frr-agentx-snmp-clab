name: frr-agentx-bgp

topology:
  nodes:
    r1:
      kind: linux
      image: frr-snmp-agentx:latest
      mgmt-ipv4: 172.20.20.11
      binds:
        - ./configs/r1/frr.conf:/etc/frr/frr.conf:ro
        - ./configs/r1/daemons:/etc/frr/daemons:ro
      exec:
        - ip link set eth1 up
        - ip addr add 10.0.12.1/30 dev eth1

    r2:
      kind: linux
      image: frr-snmp-agentx:latest
      mgmt-ipv4: 172.20.20.12
      binds:
        - ./configs/r2/frr.conf:/etc/frr/frr.conf:ro
        - ./configs/r2/daemons:/etc/frr/daemons:ro
      exec:
        - ip link set eth1 up
        - ip addr add 10.0.12.2/30 dev eth1

    snmp-exporter:
      kind: linux
      image: quay.io/prometheus/snmp-exporter:v0.30.1
      mgmt-ipv4: 172.20.20.20
      binds:
        - ./monitoring/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
      cmd: --config.file=/etc/snmp_exporter/snmp.yml

    prometheus:
      kind: linux
      image: quay.io/prometheus/prometheus:v3.12.0
      mgmt-ipv4: 172.20.20.21
      binds:
        - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      ports:
        - 9090:9090
      cmd: --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus --web.console.libraries=/usr/share/prometheus/console_libraries --web.console.templates=/usr/share/prometheus/consoles --web.enable-lifecycle

    snmp-client:
      kind: linux
      image: frr-snmp-client:latest
      mgmt-ipv4: 172.20.20.30

  links:
    - endpoints: ["r1:eth1", "r2:eth1"]
