name: frr-agentx-bgp

topology:
  nodes:
    r1:
      kind: linux
      image: frr-snmp-agentx:latest
      binds:
        - ./configs/r1/frr.conf:/etc/frr/frr.conf:ro
        - ./configs/r1/daemons:/etc/frr/daemons:ro
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - ip link set eth1 up
        - ip addr add 10.0.12.1/30 dev eth1
        - ip link set eth2 up
        - ip addr add 192.168.1.1/24 dev eth2

    r2:
      kind: linux
      image: frr-snmp-agentx:latest
      binds:
        - ./configs/r2/frr.conf:/etc/frr/frr.conf:ro
        - ./configs/r2/daemons:/etc/frr/daemons:ro
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - ip link set eth1 up
        - ip addr add 10.0.12.2/30 dev eth1
        - ip link set eth2 up
        - ip addr add 192.168.2.1/24 dev eth2

    h1:
      kind: linux
      image: frr-host:latest
      binds:
        - ./monitoring/blackbox.yml:/etc/blackbox_exporter/blackbox.yml:ro
      cmd: prometheus-blackbox-exporter --config.file=/etc/blackbox_exporter/blackbox.yml
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.1.10/24 dev eth1
        - ip route add 192.168.2.0/24 via 192.168.1.1 dev eth1

    h2:
      kind: linux
      image: frr-host:latest
      cmd: python3 -m http.server 8000 --bind 0.0.0.0
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.2.10/24 dev eth1
        - ip route add 192.168.1.0/24 via 192.168.2.1 dev eth1

    snmp-exporter:
      kind: linux
      image: quay.io/prometheus/snmp-exporter:v0.30.1
      binds:
        - ./monitoring/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
      cmd: --config.file=/etc/snmp_exporter/snmp.yml

    prometheus:
      kind: linux
      image: quay.io/prometheus/prometheus:v3.12.0
      binds:
        - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      ports:
        - 9090:9090
      cmd: --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus --web.console.libraries=/usr/share/prometheus/console_libraries --web.console.templates=/usr/share/prometheus/consoles --web.enable-lifecycle

    snmp-client:
      kind: linux
      image: frr-snmp-client:latest

  links:
    - endpoints: ["r1:eth1", "r2:eth1"]
    - endpoints: ["r1:eth2", "h1:eth1"]
    - endpoints: ["r2:eth2", "h2:eth1"]
