# Minimal lab-only SNMP config.
# Do not use this community/access model in production.

agentaddress udp:161,udp6:[::]:161

rocommunity public 0.0.0.0/0
rocommunity6 public ::/0

sysLocation Docker/Containerlab FRR AgentX lab
sysContact lab@example.invalid

# Enable net-snmp as the AgentX master.
# FRR daemons connect as AgentX subagents when started with -M snmp
# and configured with the 'agentx' command.
master agentx
agentXSocket /var/agentx/master
agentXPerms 777 777 Debian-snmp Debian-snmp

# Avoid noisy default MIB loading in this minimal container.
dontLogTCPWrappersConnects yes
