auths:
  public_v2:
    version: 2
    community: public

modules:
  bgp4:
    walk:
      - 1.3.6.1.2.1.15.2
      - 1.3.6.1.2.1.15.3.1.2
      - 1.3.6.1.2.1.15.3.1.9
    max_repetitions: 25
    retries: 3
    timeout: 3s
    metrics:
      - name: bgpLocalAs
        oid: 1.3.6.1.2.1.15.2
        type: gauge
        help: Local autonomous system number from BGP4-MIB.
      - name: bgpPeerState
        oid: 1.3.6.1.2.1.15.3.1.2
        type: gauge
        help: BGP peer connection state from BGP4-MIB; 6 is established.
        indexes:
          - labelname: bgpPeerRemoteAddr
            type: InetAddressIPv4
      - name: bgpPeerRemoteAs
        oid: 1.3.6.1.2.1.15.3.1.9
        type: gauge
        help: Remote autonomous system number from BGP4-MIB.
        indexes:
          - labelname: bgpPeerRemoteAddr
            type: InetAddressIPv4
