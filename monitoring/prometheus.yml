global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: snmp_exporter
    static_configs:
      - targets:
          - 172.20.20.20:9116

  - job_name: frr_bgp_snmp
    metrics_path: /snmp
    params:
      auth:
        - public_v2
      module:
        - bgp4
    static_configs:
      - targets:
          - 172.20.20.11
          - 172.20.20.12
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target
      - source_labels:
          - __param_target
        target_label: instance
      - target_label: __address__
        replacement: 172.20.20.20:9116
